# Coolify-ready compose file.
# In Coolify: create a "Docker Compose" resource pointing at this repo.
# Coolify injects its own proxy (Traefik) — set the domain in the Coolify UI.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # host:container — Coolify maps the domain to container port 80.
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
