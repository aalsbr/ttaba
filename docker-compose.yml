# Coolify-ready compose file.
#
# In Coolify, on the `web` service:
#   • Domain:        https://ttabba.com
#   • Ports Exposes: 80          <-- MUST be 80 (nginx listens on 80, not 3000)
# Coolify's Traefik proxy terminates TLS (Let's Encrypt) and routes the domain
# to container port 80. A "Bad Gateway" almost always means this port is wrong.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
